<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Support Sentiment Chatbot</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; }
    #chat-box { border: 1px solid #ccc; border-radius: 8px; padding: 16px; min-height: 200px; margin-bottom: 12px; }
    .msg { margin-bottom: 10px; }
    .user { font-weight: bold; }
    .bot { color: #1F3864; }
    .meta { font-size: 12px; color: #888; }
    input[type=text] { width: 80%; padding: 8px; }
    button { padding: 8px 16px; }
  </style>
</head>
<body>
  <h2>Customer Support Chatbot</h2>
  <div id="chat-box"></div>
  <input type="text" id="message" placeholder="Type a support message...">
  <button onclick="sendMessage()">Send</button>

  <script>
    async function sendMessage() {
      const input = document.getElementById("message");
      const text = input.value.trim();
      if (!text) return;

      const chatBox = document.getElementById("chat-box");
      chatBox.innerHTML += `<div class="msg user">You: ${text}</div>`;
      input.value = "";

      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();

      chatBox.innerHTML += `
        <div class="msg bot">Bot: ${data.reply}</div>
        <div class="meta">Sentiment: ${data.sentiment.label} (${data.sentiment.confidence}) |
        Category: ${data.category.category} | Escalated: ${data.escalated}</div>
      `;
      chatBox.scrollTop = chatBox.scrollHeight;
    }
  </script>
</body>
</html>
